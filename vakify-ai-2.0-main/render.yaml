services:
  - type: web
    name: vakify-api
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app
    autoDeploy: true
    healthCheckPath: /api/health
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: vakify-db
          property: connectionString
      - key: CORS_ORIGINS
        value: "*"
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ELEVENLABS_VOICE_ID
        value: EXAVITQu4vr4xnSDxMaL
      - key: ELEVENLABS_MODEL_ID
        value: eleven_multilingual_v2
      - key: LEONARDO_MODEL_ID
        value: b24e16ff-06e3-43eb-8d33-4416c2d75876

databases:
  - name: vakify-db
    plan: free
